<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="scenarioGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="envGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="judgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="rewardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="trainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="serveGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ec4899"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700" letter-spacing="1">ReplicaLab Architecture</text>
  <text x="550" y="60" text-anchor="middle" fill="#64748b" font-size="12">Multi-Agent Scientific Replication Environment</text>

  <!-- ==================== SCENARIO GENERATION ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="80" width="340" height="120" rx="12" fill="url(#scenarioGrad)" opacity="0.95"/>
    <text x="200" y="102" text-anchor="middle" fill="#dbeafe" font-size="11" font-weight="600" letter-spacing="1.5" text-transform="uppercase">SCENARIO GENERATION</text>
    <!-- Paper Templates -->
    <rect x="45" y="112" width="145" height="40" rx="8" fill="#1e40af" opacity="0.6"/>
    <text x="117" y="130" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Paper Templates</text>
    <text x="117" y="144" text-anchor="middle" fill="#bfdbfe" font-size="9">Cell Bio / ML / Psych</text>
    <!-- Constraint Gen -->
    <rect x="200" y="112" width="155" height="40" rx="8" fill="#1e40af" opacity="0.6"/>
    <text x="277" y="130" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Constraint Generator</text>
    <text x="277" y="144" text-anchor="middle" fill="#bfdbfe" font-size="9">Equipment / Budget / Staff</text>
    <!-- Scenario Engine -->
    <rect x="95" y="160" width="210" height="32" rx="8" fill="#1e3a8a" opacity="0.7"/>
    <text x="200" y="180" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Scenario Engine (Seed -> World)</text>
  </g>

  <!-- ==================== ENVIRONMENT ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="230" width="700" height="310" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="380" y="252" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">REPLICALAB ENVIRONMENT (OpenEnv)</text>

    <!-- State Box -->
    <rect x="50" y="265" width="260" height="60" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="180" y="286" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Environment State</text>
    <text x="180" y="302" text-anchor="middle" fill="#94a3b8" font-size="9">Paper / Constraints / Round / Budget / Protocol / History</text>

    <!-- Scientist Agent -->
    <rect x="50" y="345" width="200" height="90" rx="10" fill="url(#agentGrad)" opacity="0.9"/>
    <text x="150" y="370" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Scientist Agent</text>
    <text x="150" y="387" text-anchor="middle" fill="#ddd6fe" font-size="10">Trainable Policy</text>
    <line x1="70" y1="397" x2="230" y2="397" stroke="#a78bfa" stroke-width="0.5" opacity="0.5"/>
    <text x="150" y="413" text-anchor="middle" fill="#c4b5fd" font-size="9">propose / revise / ask / accept</text>
    <text x="150" y="427" text-anchor="middle" fill="#c4b5fd" font-size="9">Protects scientific validity</text>

    <!-- Lab Manager Agent -->
    <rect x="280" y="345" width="200" height="90" rx="10" fill="url(#agentGrad)" opacity="0.9"/>
    <text x="380" y="370" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Lab Manager Agent</text>
    <text x="380" y="387" text-anchor="middle" fill="#ddd6fe" font-size="10">Rule-Based Policy</text>
    <line x1="300" y1="397" x2="460" y2="397" stroke="#a78bfa" stroke-width="0.5" opacity="0.5"/>
    <text x="380" y="413" text-anchor="middle" fill="#c4b5fd" font-size="9">report / suggest / reject / accept</text>
    <text x="380" y="427" text-anchor="middle" fill="#c4b5fd" font-size="9">Protects feasibility</text>

    <!-- Arrows between agents -->
    <line x1="250" y1="375" x2="280" y2="375" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
    <text x="265" y="369" text-anchor="middle" fill="#a78bfa" font-size="7">Proposal</text>
    <line x1="280" y1="400" x2="250" y2="400" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
    <text x="265" y="412" text-anchor="middle" fill="#a78bfa" font-size="7">Constraint</text>

    <!-- State -> Agents arrow -->
    <line x1="180" y1="325" x2="180" y2="345" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowWhite)"/>

    <!-- Agents -> State (step) -->
    <line x1="310" y1="345" x2="310" y2="320" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowWhite)"/>
    <text x="328" y="333" fill="#64748b" font-size="8">step()</text>

    <!-- Judge -->
    <rect x="510" y="290" width="200" height="90" rx="10" fill="url(#judgeGrad)" opacity="0.9"/>
    <text x="610" y="315" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="700">Judge Engine</text>
    <line x1="530" y1="325" x2="690" y2="325" stroke="#92400e" stroke-width="0.5" opacity="0.4"/>
    <text x="610" y="342" text-anchor="middle" fill="#451a03" font-size="10" font-weight="600">Rubric Scorer (Deterministic)</text>
    <text x="610" y="358" text-anchor="middle" fill="#78350f" font-size="9">+ Optional Explanation Layer</text>
    <text x="610" y="372" text-anchor="middle" fill="#78350f" font-size="9">Rigor / Feasibility / Fidelity</text>

    <!-- State -> Judge -->
    <line x1="310" y1="290" x2="510" y2="310" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowWhite)"/>
    <text x="415" y="288" fill="#f59e0b" font-size="8">Episode End</text>

    <!-- Negotiation rounds label -->
    <rect x="50" y="450" width="430" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <text x="265" y="468" text-anchor="middle" fill="#64748b" font-size="10">Multiple negotiation rounds until agreement or timeout</text>
  </g>

  <!-- ==================== REWARD ==================== -->
  <g filter="url(#shadow)">
    <rect x="760" y="230" width="310" height="160" rx="12" fill="url(#rewardGrad)" opacity="0.92"/>
    <text x="915" y="252" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600" letter-spacing="1.5">REWARD COMPUTATION</text>

    <rect x="775" y="265" width="70" height="36" rx="6" fill="#047857" opacity="0.6"/>
    <text x="810" y="287" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Rigor</text>

    <rect x="855" y="265" width="85" height="36" rx="6" fill="#047857" opacity="0.6"/>
    <text x="897" y="287" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Feasibility</text>

    <rect x="950" y="265" width="75" height="36" rx="6" fill="#047857" opacity="0.6"/>
    <text x="987" y="287" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Fidelity</text>

    <rect x="775" y="310" width="100" height="30" rx="6" fill="#065f46" opacity="0.5"/>
    <text x="825" y="329" text-anchor="middle" fill="#a7f3d0" font-size="9">Efficiency + Comm Bonus</text>

    <rect x="885" y="310" width="80" height="30" rx="6" fill="#065f46" opacity="0.5"/>
    <text x="925" y="329" text-anchor="middle" fill="#fca5a5" font-size="9">Penalties</text>

    <!-- Total Reward -->
    <rect x="810" y="350" width="210" height="30" rx="8" fill="#064e3b" opacity="0.8" stroke="#34d399" stroke-width="1"/>
    <text x="915" y="370" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Total = 10 x R x Fe x Fi + B - P</text>
  </g>

  <!-- Judge -> Reward arrow -->
  <line x1="710" y1="335" x2="760" y2="320" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="735" y="316" fill="#10b981" font-size="8">Scores</text>

  <!-- ==================== RL TRAINING ==================== -->
  <g filter="url(#shadow)">
    <rect x="760" y="420" width="310" height="120" rx="12" fill="url(#trainGrad)" opacity="0.92"/>
    <text x="915" y="442" text-anchor="middle" fill="#fecaca" font-size="11" font-weight="600" letter-spacing="1.5">RL TRAINING PIPELINE</text>

    <rect x="775" y="455" width="130" height="36" rx="8" fill="#991b1b" opacity="0.5"/>
    <text x="840" y="472" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Google Colab</text>
    <text x="840" y="485" text-anchor="middle" fill="#fca5a5" font-size="8">TRL / Unsloth / GRPO</text>

    <rect x="915" y="455" width="140" height="36" rx="8" fill="#991b1b" opacity="0.5"/>
    <text x="985" y="472" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Rollout Loop</text>
    <text x="985" y="485" text-anchor="middle" fill="#fca5a5" font-size="8">reset() -> step() -> reward</text>

    <rect x="835" y="500" width="160" height="30" rx="8" fill="#7f1d1d" opacity="0.6"/>
    <text x="915" y="520" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Reward Curves (Before vs After)</text>
  </g>

  <!-- Reward -> Training arrow -->
  <line x1="915" y1="390" x2="915" y2="420" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="942" y="408" fill="#f87171" font-size="8">Reward Signal</text>

  <!-- Training -> Scientist (policy weights) dashed -->
  <path d="M 760 490 L 650 490 L 650 450 L 150 450 L 150 435" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowRed)"/>
  <text x="400" y="462" fill="#f87171" font-size="8">Updated Scientist Policy Weights</text>

  <!-- Training -> Env (episodes) -->
  <path d="M 760 470 L 730 470 L 730 400 L 380 400 L 380 435" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowWhite)"/>
  <text x="560" y="405" fill="#64748b" font-size="8">Episodes</text>

  <!-- Scenario -> Env arrow -->
  <line x1="200" y1="200" x2="200" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <text x="225" y="218" fill="#94a3b8" font-size="8">reset(seed)</text>

  <!-- ==================== DEPLOYMENT ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="570" width="500" height="100" rx="12" fill="url(#serveGrad)" opacity="0.92"/>
    <text x="280" y="592" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600" letter-spacing="1.5">DEPLOYMENT &amp; SERVING</text>

    <rect x="50" y="605" width="140" height="45" rx="8" fill="#3730a3" opacity="0.5"/>
    <text x="120" y="625" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">FastAPI Server</text>
    <text x="120" y="641" text-anchor="middle" fill="#a5b4fc" font-size="9">+ WebSocket</text>

    <rect x="210" y="605" width="140" height="45" rx="8" fill="#3730a3" opacity="0.5"/>
    <text x="280" y="625" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Docker Container</text>
    <text x="280" y="641" text-anchor="middle" fill="#a5b4fc" font-size="9">Packaged App</text>

    <rect x="370" y="605" width="145" height="45" rx="8" fill="#3730a3" opacity="0.5"/>
    <text x="442" y="625" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">HF Space</text>
    <text x="442" y="641" text-anchor="middle" fill="#a5b4fc" font-size="9">sdk: docker / port: 7860</text>

    <!-- Flow arrows -->
    <line x1="190" y1="627" x2="210" y2="627" stroke="#a5b4fc" stroke-width="1" marker-end="url(#arrowWhite)"/>
    <line x1="350" y1="627" x2="370" y2="627" stroke="#a5b4fc" stroke-width="1" marker-end="url(#arrowWhite)"/>
  </g>

  <!-- Env -> Serving arrow -->
  <line x1="200" y1="540" x2="200" y2="570" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <text x="220" y="558" fill="#94a3b8" font-size="8">API</text>

  <!-- ==================== FRONTEND ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="700" width="500" height="190" rx="12" fill="url(#uiGrad)" opacity="0.92"/>
    <text x="280" y="722" text-anchor="middle" fill="#fce7f3" font-size="11" font-weight="600" letter-spacing="1.5">FRONTEND</text>

    <rect x="50" y="735" width="130" height="40" rx="8" fill="#9d174d" opacity="0.5"/>
    <text x="115" y="755" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">React + Vite</text>
    <text x="115" y="769" text-anchor="middle" fill="#fbcfe8" font-size="9">Primary UI</text>

    <rect x="200" y="735" width="130" height="40" rx="8" fill="#9d174d" opacity="0.5"/>
    <text x="265" y="755" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">OpenEnv /web</text>
    <text x="265" y="769" text-anchor="middle" fill="#fbcfe8" font-size="9">Fallback</text>

    <!-- Panels -->
    <rect x="50" y="790" width="145" height="85" rx="8" fill="#fdf2f8" opacity="0.15" stroke="#f9a8d4" stroke-width="0.8"/>
    <text x="122" y="812" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Left Panel</text>
    <text x="122" y="828" text-anchor="middle" fill="#fbcfe8" font-size="9">Paper Summary</text>
    <text x="122" y="842" text-anchor="middle" fill="#fbcfe8" font-size="9">Seed / Round</text>
    <text x="122" y="856" text-anchor="middle" fill="#fbcfe8" font-size="9">Challenge Label</text>

    <rect x="207" y="790" width="145" height="85" rx="8" fill="#fdf2f8" opacity="0.15" stroke="#f9a8d4" stroke-width="0.8"/>
    <text x="279" y="812" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Middle Panel</text>
    <text x="279" y="828" text-anchor="middle" fill="#fbcfe8" font-size="9">Negotiation Log</text>
    <text x="279" y="842" text-anchor="middle" fill="#fbcfe8" font-size="9">Scientist (blue)</text>
    <text x="279" y="856" text-anchor="middle" fill="#fbcfe8" font-size="9">Lab Manager (green)</text>

    <rect x="364" y="790" width="150" height="85" rx="8" fill="#fdf2f8" opacity="0.15" stroke="#f9a8d4" stroke-width="0.8"/>
    <text x="439" y="812" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Right Panel</text>
    <text x="439" y="828" text-anchor="middle" fill="#fbcfe8" font-size="9">Current Protocol</text>
    <text x="439" y="842" text-anchor="middle" fill="#fbcfe8" font-size="9">Budget Bar</text>
    <text x="439" y="856" text-anchor="middle" fill="#fbcfe8" font-size="9">Score Bars (R/Fe/Fi)</text>
  </g>

  <!-- Serving -> Frontend -->
  <line x1="120" y1="670" x2="120" y2="700" stroke="#ec4899" stroke-width="1.5" marker-end="url(#arrowPink)"/>
  <text x="145" y="688" fill="#ec4899" font-size="8">WebSocket</text>

  <!-- ==================== LEGEND ==================== -->
  <g>
    <rect x="580" y="570" width="490" height="310" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" opacity="0.8"/>
    <text x="825" y="595" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">SYSTEM LEGEND</text>

    <!-- Legend items -->
    <rect x="600" y="612" width="18" height="14" rx="3" fill="url(#scenarioGrad)"/>
    <text x="628" y="624" fill="#e2e8f0" font-size="10">Scenario Generation</text>

    <rect x="600" y="636" width="18" height="14" rx="3" fill="url(#agentGrad)"/>
    <text x="628" y="648" fill="#e2e8f0" font-size="10">Negotiating Agents</text>

    <rect x="600" y="660" width="18" height="14" rx="3" fill="url(#judgeGrad)"/>
    <text x="628" y="672" fill="#e2e8f0" font-size="10">Judge Engine</text>

    <rect x="600" y="684" width="18" height="14" rx="3" fill="url(#rewardGrad)"/>
    <text x="628" y="696" fill="#e2e8f0" font-size="10">Reward Computation</text>

    <rect x="820" y="612" width="18" height="14" rx="3" fill="url(#trainGrad)"/>
    <text x="848" y="624" fill="#e2e8f0" font-size="10">RL Training Pipeline</text>

    <rect x="820" y="636" width="18" height="14" rx="3" fill="url(#serveGrad)"/>
    <text x="848" y="648" fill="#e2e8f0" font-size="10">Deployment &amp; Serving</text>

    <rect x="820" y="660" width="18" height="14" rx="3" fill="url(#uiGrad)"/>
    <text x="848" y="672" fill="#e2e8f0" font-size="10">Frontend UI</text>

    <!-- Key flow -->
    <line x1="600" y1="715" x2="1050" y2="715" stroke="#334155" stroke-width="0.5"/>
    <text x="825" y="738" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">KEY FLOW</text>

    <text x="610" y="762" fill="#cbd5e1" font-size="10" font-weight="600">1.</text>
    <text x="628" y="762" fill="#94a3b8" font-size="10">Scenario Engine generates a paper + lab constraints from a seed</text>

    <text x="610" y="782" fill="#cbd5e1" font-size="10" font-weight="600">2.</text>
    <text x="628" y="782" fill="#94a3b8" font-size="10">Scientist proposes a replication protocol</text>

    <text x="610" y="802" fill="#cbd5e1" font-size="10" font-weight="600">3.</text>
    <text x="628" y="802" fill="#94a3b8" font-size="10">Lab Manager checks feasibility and negotiates</text>

    <text x="610" y="822" fill="#cbd5e1" font-size="10" font-weight="600">4.</text>
    <text x="628" y="822" fill="#94a3b8" font-size="10">Judge scores the final protocol on Rigor / Feasibility / Fidelity</text>

    <text x="610" y="842" fill="#cbd5e1" font-size="10" font-weight="600">5.</text>
    <text x="628" y="842" fill="#94a3b8" font-size="10">Reward signal trains the Scientist to negotiate better over time</text>

    <text x="610" y="862" fill="#cbd5e1" font-size="10" font-weight="600">6.</text>
    <text x="628" y="862" fill="#94a3b8" font-size="10">Deployed via Docker on Hugging Face Spaces with React UI</text>
  </g>
</svg>